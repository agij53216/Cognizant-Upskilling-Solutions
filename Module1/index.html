<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Bootstrap5 Exercises</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <!-- Exercise 1 - Responsive Grid -->
        <div class="container mt-4">
            <div class="row">
                <div class="col-12 col-md-6 col-lg-4 bg-primary text-white p-3">
                    Column 1
                </div>
                <div
                    class="col-12 col-md-6 col-lg-4 bg-secondary text-white p-3"
                >
                    Column 2
                </div>
                <div class="col-12 col-md-6 col-lg-4 bg-success text-white p-3">
                    Column 3
                </div>
            </div>
        </div>

        <!-- Exercise 2 - Navbar -->
        <nav class="navbar navbar-expand-md navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="#">Portal</a>
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navMenu"
                    aria-controls="navMenu"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Events</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Exercise 3 - Card -->
        <div class="container mt-4">
            <div class="card shadow" style="width: 300px">
                <img
                    src="https://via.placeholder.com/300x150"
                    class="card-img-top"
                    alt="Event"
                />
                <div class="card-body">
                    <h5 class="card-title">Tech Meetup</h5>
                    <p class="card-text text-muted">
                        Join us for an evening of tech talks.
                    </p>
                    <a href="#" class="btn btn-primary">Register</a>
                </div>
            </div>
        </div>

        <!-- Exercise 4 - Modal -->
        <div class="container mt-4">
            <button
                class="btn btn-warning"
                data-bs-toggle="modal"
                data-bs-target="#myModal"
            >
                <i class="bi bi-bell"></i> Open Modal
            </button>
        </div>
        <div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="myModalLabel">Event Details</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                        ></button>
                    </div>
                    <div class="modal-body">Welcome to the Tech Meetup!</div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Exercise 5 - Registration Form -->
        <div class="container mt-4">
            <form id="registrationForm">
                <div class="form-floating mb-3">
                    <input
                        type="text"
                        id="fullName"
                        class="form-control"
                        placeholder="Name"
                        required
                    />
                    <label for="fullName">Full Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input
                        type="email"
                        id="emailAddress"
                        class="form-control"
                        placeholder="Email"
                        required
                    />
                    <label for="emailAddress">Email</label>
                </div>
                <button type="submit" class="btn btn-success">Submit</button>
            </form>
        </div>

        <!-- Footer with icons -->
        <footer class="bg-dark text-white text-center p-3 mt-4">
            <i class="bi bi-facebook me-3"></i>
            <i class="bi bi-twitter me-3"></i>
            <i class="bi bi-instagram"></i>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
